name: TechInterview100

options:
  bundleIdPrefix: com.leeo
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  TechInterview100:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TechInterview100
        excludes:
          - "**/*.json"
    resources:
      - path: TechInterview100/Resources
      - path: TechInterview100/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leeo.techinterview100
        INFOPLIST_FILE: TechInterview100/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
